<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tải Lên Tài Liệu</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { 
      font-family:'Roboto', sans-serif; 
      background:#f0f4f8; 
      color:#333; 
      min-height:100vh; 
      padding:20px; 
    }
    .container { 
      max-width:520px; 
      margin:0 auto; 
      background:white; 
      padding:40px 30px; 
      border-radius:16px; 
      box-shadow:0 10px 30px rgba(0,0,0,0.1); 
    }
    h1 { 
      text-align:center; 
      color:#003366; 
      margin-bottom:30px; 
      font-size:28px; 
    }
    .field { margin:25px 0; }
    .field label { 
      display:block; 
      margin-bottom:10px; 
      font-weight:500; 
      color:#003366; 
    }
    input[type="file"] { 
      width:100%; 
      padding:12px; 
      border:1px solid #ccc; 
      border-radius:8px; 
      background:#f9f9f9; 
      cursor:pointer; 
    }
    input[type="file"]::file-selector-button { 
      padding:10px 16px; 
      background:#0066cc; 
      color:white; 
      border:none; 
      border-radius:6px; 
      cursor:pointer; 
    }
    .btn { 
      width:100%; 
      padding:16px; 
      background:#0066cc; 
      color:white; 
      border:none; 
      border-radius:8px; 
      font-size:18px; 
      font-weight:500; 
      cursor:pointer; 
      margin-top:40px; 
      transition:0.3s; 
    }
    .btn:hover { 
      background:#0055b3; 
      transform:translateY(-2px); 
    }
    .note { 
      font-size:14px; 
      color:#666; 
      margin-top:8px; 
    }
    @media (max-width:500px) { 
      .container { padding:30px 20px; } 
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Tải Lên Tài Liệu</h1>

    <div class="field">
      <label>CCCD Mặt Trước / Mặt Sau</label>
      <input type="file" accept="image/*" required>
      <input type="file" accept="image/*" required style="margin-top:12px;">
      <div class="note">Chọn 2 file ảnh rõ nét</div>
    </div>

    <div class="field">
      <label>Ảnh Hộ Chiếu (trang thông tin cá nhân)</label>
      <input type="file" accept="image/*,.pdf" required>
      <div class="note">Ảnh rõ nét, định dạng JPG/PNG/PDF</div>
    </div>

    <div class="field">
      <label>Bằng Chứng Tài Chính (sao kê ngân hàng, hợp đồng lao động...)</label>
      <input type="file" accept=".pdf,image/*" required>
      <div class="note">Tải file PDF hoặc ảnh (tối đa 10MB/file)</div>
    </div>

    <button onclick="alert('Hồ sơ đã nộp thành công! (demo)');" class="btn">Nộp Hồ Sơ</button>
  </div>

</body>
</html>
