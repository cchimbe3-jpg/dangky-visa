<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng Ký Thị Thực Visa Úc</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { 
      font-family:'Roboto', sans-serif; 
      background:#f0f4f8; 
      color:#333; 
      min-height:100vh; 
      padding:20px; 
    }
    .container { 
      max-width:520px; 
      margin:0 auto; 
      background:white; 
      padding:40px 30px; 
      border-radius:16px; 
      box-shadow:0 10px 30px rgba(0,0,0,0.1); 
    }
    h1 { 
      text-align:center; 
      color:#003366; 
      margin-bottom:30px; 
      font-size:28px; 
    }
    label { 
      display:block; 
      margin:20px 0 8px; 
      font-weight:500; 
      color:#003366; 
    }
    input { 
      width:100%; 
      padding:14px; 
      border:1px solid #ccc; 
      border-radius:8px; 
      font-size:16px; 
      transition:0.3s; 
    }
    input:focus { 
      border-color:#0066cc; 
      outline:none; 
      box-shadow:0 0 0 3px rgba(0,102,204,0.1); 
    }
    .btn { 
      width:100%; 
      padding:16px; 
      background:#0066cc; 
      color:white; 
      border:none; 
      border-radius:8px; 
      font-size:18px; 
      font-weight:500; 
      cursor:pointer; 
      margin-top:30px; 
      transition:0.3s; 
    }
    .btn:hover { 
      background:#0055b3; 
      transform:translateY(-2px); 
    }
    @media (max-width:500px) { 
      .container { padding:30px 20px; } 
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Đăng Ký Thị Thực Visa</h1>

    <form action="upload.html" method="get">
      <label for="hoten">Họ và Tên</label>
      <input type="text" id="hoten" placeholder="Họ và Tên" required>

      <label for="sdt">Số điện thoại liên hệ</label>
      <input type="tel" id="sdt" placeholder="Ví dụ: 0912345678" pattern="[0-9]{9,11}" required>

      <label for="cccd">Số CCCD / CMND</label>
      <input type="text" id="cccd" placeholder="Số CCCD" pattern="[0-9]{9,12}" required>

      <label for="ngthan1">Số liên lạc người thân 1</label>
      <input type="tel" id="ngthan1" placeholder="Số điện thoại người thân 1" pattern="[0-9]{9,11}" required>

      <label for="ngthan2">Số liên lạc người thân 2</label>
      <input type="tel" id="ngthan2" placeholder="Số điện thoại người thân 2 (không bắt buộc)" pattern="[0-9]{9,11}">

      <button type="submit" class="btn">Gửi Hồ Sơ</button>
    </form>
  </div>

</body>
</html>
